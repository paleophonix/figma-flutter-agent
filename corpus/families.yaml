version: 1

families:
  - id: llm_fidelity_authority_bypass
    title: LLM fidelity authority bypass
    pipeline_arrows:
      - A1
    owning_stage: ir_validation
    owners:
      - module: src/figma_flutter_agent/generator/ir/fidelity/stamp.py
        symbol: _stamp_node
    law_ids:
      - LAW-A1-FIDELITY-AUTHORITY
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
      - AMBIGUOUS
    description: >
      LLM-authored fidelity fields are accepted as compiler authority
      and can alter the semantic emit route.
    status: active

  - id: ir_override_without_provenance
    title: IR override without provenance
    pipeline_arrows:
      - A1
    owning_stage: ir_pass
    owners:
      - module: src/figma_flutter_agent/generator/ir/tree.py
        symbol: _apply_ir_overrides
    law_ids:
      - LAW-A1-OVERRIDE-PROV
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      IR overrides mutate clean-tree facts without a DeviationRecord.
    status: active

  - id: ir_merge_visible_child_drop
    title: IR merge visible child drop
    pipeline_arrows:
      - A1
    owning_stage: ir_pass
    owners:
      - module: src/figma_flutter_agent/generator/ir/tree.py
        symbol: merge_ir_node
    law_ids:
      - LAW-A1-DROP-VISIBLE
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Clean children disappear during merge without a named deviation or policy.
    status: active

  - id: graph_sync_violation
    title: Graph sync violation
    pipeline_arrows:
      - CP2
    owning_stage: ir_pass
    owners:
      - module: src/figma_flutter_agent/generator/geometry/invariants/conservation.py
        symbol: check_graph_sync
    law_ids:
      - LAW-CP2-GRAPH-SYNC
    default_blast_radius: B3_BLOCKING
    allowed_origins:
      - COMPILER
    description: >
      IR figmaId multiset diverges from the clean tree after a pass.
    status: active

  - id: node_multiset_loss
    title: Node multiset loss
    pipeline_arrows:
      - A1
    owning_stage: conservation
    owners:
      - module: src/figma_flutter_agent/generator/geometry/invariants/conservation.py
        symbol: check_node_multiset_preserved
    law_ids:
      - LAW-CONSERVE-MULTISET
    default_blast_radius: B3_BLOCKING
    allowed_origins:
      - COMPILER
    description: >
      Node identity multiset is not preserved across a pipeline arrow.
    status: active

  - id: pass_over_mutation
    title: Pass over-mutation
    pipeline_arrows:
      - CP2
    owning_stage: ir_pass
    owners:
      - module: src/figma_flutter_agent/generator/ir/passes/contract.py
        symbol: validate_pass_mutates
    law_ids:
      - LAW-PASS-CONTRACT
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      A registered IR pass mutates fields outside its declared contract.
    status: active

  - id: extracted_widget_subtree_conservation_gap
    title: Extracted widget subtree conservation gap
    pipeline_arrows:
      - A1
    owning_stage: ir_validation
    owners:
      - module: src/figma_flutter_agent/generator/ir/validate/__init__.py
        symbol: validate_extracted_widgets
    law_ids:
      - LAW-WIDGETIR-CONSERVE
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Extracted widget IR validation is skipped or silent without a named outcome.
    status: active

  - id: cluster_delegate_map_reconcile_clobber
    title: Planner cluster delegate map clobbered in reconcile
    pipeline_arrows:
      - A3
    owning_stage: planned_reconcile
    owners:
      - module: src/figma_flutter_agent/generator/planned/reconcile/__init__.py
        symbol: reconcile_planned_dart_files
    law_ids:
      - LAW-CLUSTER-DELEGATE-BIJECTION
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Final planned-Dart reconcile rebuilds cluster_classes from legacy repetition
      extraction instead of preserving the planner enriched cluster widget map.
    status: active

  - id: semantic_upgrade_without_required_evidence
    title: Semantic upgrade without required evidence
    pipeline_arrows:
      - A3
    owning_stage: ir_validation
    owners:
      - module: src/figma_flutter_agent/generator/ir/fidelity/stamp.py
        symbol: _stamp_node
    law_ids:
      - LAW-A3-CLASSIFY
      - LAW-A1-FIDELITY-AUTHORITY
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Native or verified semantic emit is allowed without required detector evidence
      or manifest authority.
    status: active

  - id: semantic_veto_not_applied
    title: Semantic veto not applied
    pipeline_arrows:
      - A3
    owning_stage: classification
    owners:
      - module: src/figma_flutter_agent/parser/semantics/arbiter.py
        symbol: arbitrate
    law_ids:
      - LAW-A3-CLASSIFY
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Arbiter veto or abstain bucket should block a semantic kind but emit proceeds.
    status: active

  - id: semantic_candidate_not_generated
    title: Semantic candidate not generated
    pipeline_arrows:
      - A3
    owning_stage: classification
    owners:
      - module: src/figma_flutter_agent/parser/semantics/prefilter.py
        symbol: plausible_kinds
      - module: src/figma_flutter_agent/parser/semantics/classify.py
        symbol: classify_screen_ir
    law_ids:
      - LAW-A3-CLASSIFY
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      A plausible semantic kind never reaches detector candidates for a matching tree.
    status: active

  - id: classification_scope_violation
    title: Classification scope violation
    pipeline_arrows:
      - CP2
    owning_stage: conservation
    owners:
      - module: src/figma_flutter_agent/generator/geometry/invariants/conservation.py
        symbol: check_ir_classification_scope
      - module: src/figma_flutter_agent/generator/geometry/invariants/conservation.py
        symbol: check_clean_tree_unchanged
    law_ids:
      - LAW-CP2-CLASSIFY-SCOPE
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Classification mutates clean-tree facts or non-semantic IR fields.
    status: active

  - id: screen_root_scope_veto_missing
    title: Screen root scope veto missing
    pipeline_arrows:
      - A3
    owning_stage: ir_validation
    owners:
      - module: src/figma_flutter_agent/generator/ir/validate/root_kind.py
        symbol: heal_screen_root_control_kind
    law_ids:
      - LAW-A3-ROOT-KIND
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Screen-root IR kind contradicts artboard scope without veto or heal.
    status: active

  - id: ir_cache_assert_bypasses_policy
    title: IR cache hard assert bypasses policy
    pipeline_arrows:
      - NONE
    owning_stage: llm
    owners:
      - module: src/figma_flutter_agent/pipeline/llm.py
        symbol: load_cached_ir_llm_outcome
    law_ids:
      - LAW-IR-CACHE-POLICY-ORDER
    default_blast_radius: B3_BLOCKING
    allowed_origins:
      - COMPILER
    description: >
      Cached IR compatibility is hard-rejected before shadow/enforce policy
      can warn or trigger LLM regeneration on cleanTreeHash drift.
    status: active

  - id: semantic_action_veto
    title: Action surface misclassified as text input
    pipeline_arrows:
      - A3
    owning_stage: emitter
    owners:
      - module: src/figma_flutter_agent/parser/interaction/inline_input_hosts.py
        symbol: flex_painted_action_surface_vetoes_input
    law_ids:
      - SemanticActionVetoLaw
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Painted CTA and button rows must not compile as inline TextFormField hosts
      when structural action affordance is present.
    status: active

  - id: decorative_glyph_semantic_veto
    title: Decorative glyph misclassified as interactive control
    pipeline_arrows:
      - A4
    owning_stage: parser
    owners:
      - module: src/figma_flutter_agent/parser/interaction/forms.py
        symbol: layout_fact_checkbox_control
    law_ids:
      - DecorativeGlyphSemanticVetoLaw
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Named vector pictogram hosts must not be promoted to checkbox or other
      interactive controls without required semantic evidence.
    status: active

  - id: paint_surface_omit_without_transfer
    title: Button surface omitted without paint transfer
    pipeline_arrows:
      - A3
    owning_stage: emitter
    owners:
      - module: src/figma_flutter_agent/generator/layout/widgets/emit/shell.py
        symbol: _button_covering_surface_may_omit
    law_ids:
      - PaintSurfaceTransferCompletenessLaw
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      A full-cover button/card surface child is dropped from emit without
      transferring its paint to the host Ink decoration or retaining the node.
    status: active

  - id: trailing_chevron_slot_sizing
    title: Trailing chevron component slot sizing
    pipeline_arrows:
      - A3
    owning_stage: emitter
    owners:
      - module: src/figma_flutter_agent/generator/layout/widgets/svg.py
        symbol: _intrinsic_glyph_svg_dimensions
    law_ids:
      - DirectionalGlyphIntrinsicBoundsLaw
    default_blast_radius: B2_SILENT_WRONG_BEHAVIOR
    allowed_origins:
      - COMPILER
    description: >
      Trailing chevron hosts with component chevron-right exports must size
      SVGs to the action slot instead of nested micro-vector paint bounds.
    status: active
