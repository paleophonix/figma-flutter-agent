version: 1

case:
  id: 2026-07-07-niyama-image-cross-stretch-blowup
  title: Product image inflated by CrossAxisAlignment.stretch and BoxFit.cover
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T00:30:00Z'
  updated_at: '2026-07-07T01:10:00Z'
  summary: >
    In OrderProductItemWidget the product thumbnail is emitted as
    Image.asset(width: 76, height: 76, fit: BoxFit.cover) as a direct child of a
    Column with crossAxisAlignment: CrossAxisAlignment.stretch. The stretch imposes a
    tight cross-axis width, overriding the 76px width so the image inflates to the full
    row and BoxFit.cover blows the picture up, producing RIGHT OVERFLOWED BY 192 PIXELS
    and BOTTOM OVERFLOWED banners. The same mechanism stretches rep_edit_profile chips
    (Container width 89 under a stretch Column). Hug and fixed-size leaves must be
    wrapped in Align so cross-stretch does not inflate them.

occurrences:
  - id: niyama-order-image-cross-stretch
    family_id: flex_cross_stretch_inflates_fixed_child
    pipeline_arrow: A3
    law_id: LAW-CROSS-STRETCH-PRESERVES-FIXED-CHILD
    stage: emitter
    origin: COMPILER
    blast_radius: B2_SILENT_WRONG_BEHAVIOR
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/generator/layout/flex_policy/row.py
      symbol: _column_child_keeps_intrinsic_width
    contract:
      field: fixed-size flex child under CrossAxisAlignment.stretch
      field_class: fact
      category: illegal
      expected: >
        A fixed or hug-size leaf keeps its intrinsic width/height under a
        CrossAxisAlignment.stretch parent because it is wrapped in Align/SizedBox, so
        images and chips are not inflated and no RenderFlex overflow occurs.
      actual: >
        Image.asset(76x76, BoxFit.cover) is a direct stretch child, inflated to the row
        width and blown up, causing a 192px right overflow.
    authority_boundary: planned_dart_graph
    evidence:
      - kind: source_code
        path: apps/test/lib/widgets/order_product_item_widget.dart
        summary: Image.asset(width 76 height 76 BoxFit.cover) inside Column(crossAxisAlignment stretch).
      - kind: source_code
        path: apps/test/lib/generated/rep_edit_profile_chunk_d31b9cc1.dart
        summary: same mechanism inflates Container(width 89) chips under a stretch Column.
      - kind: log
        path: .debug/screen/test/niyama_order/last.log
        summary: Chrome preview RenderFlex overflowed by 192 pixels on the right (repeated per product row).
    repair:
      summary: >
        Treat fixed-width IMAGE/VECTOR/CONTAINER leaves under COLUMN as intrinsic-width
        children and wrap them with Align before stretch can override cross-axis size.
      changed_files:
        - src/figma_flutter_agent/generator/layout/flex_policy/row.py
        - src/figma_flutter_agent/generator/layout/flex_policy/wrap.py
      regression_tests:
        - tests/test_rep_edit_profile_batch_repair.py::test_column_stretch_wraps_fixed_image_with_align
        - tests/test_rep_edit_profile_batch_repair.py::test_column_stretch_wraps_fixed_chip_with_align
      verification:
        - poetry run pytest tests/test_rep_edit_profile_batch_repair.py -q
