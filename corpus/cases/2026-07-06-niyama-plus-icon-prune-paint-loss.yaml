case:
  id: 2026-07-06-niyama-plus-icon-prune-paint-loss
  title: Plus icon cluster pruned to empty stack without drawable transfer
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-06
  created_at: '2026-07-06T18:00:00Z'
  updated_at: '2026-07-06T19:30:00Z'
  summary: >
    LAW-CLUSTER-PRUNE-PAINT-CONSERVATION — duplicated Icons/28/Plus component
    instances (component_910_3249) are pruned to empty STACK children while a
    visible VECTOR descendant lacks vectorAssetKey; hydration fails because
    pruned instances key as leaf while templates key by structure signature.
    PlusIconWidget materializes as shrink shell and aborts plan.
    Follow-up: non-transactional guard fix regressed CP0 multiset — see
    2026-07-06-niyama-cluster-prune-flatten-multiset.

occurrences:
  - id: niyama-order-plus-icon-prune-paint-loss
    family_id: cluster_prune_visible_paint_without_transfer
    pipeline_arrow: A4
    law_id: LAW-CLUSTER-PRUNE-PAINT-CONSERVATION
    stage: parser_dedup
    origin: COMPILER
    blast_radius: B3_BLOCKING
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/parser/dedup/prune.py
      symbol: _would_drop_unbound_visible_vectors
    contract:
      field: cluster duplicate children
      field_class: fact
      category: illegal
      expected: >
        Cluster prune clears children only after drawable transfer (bound vector,
        image, or text facts) or hydration can restore from a stable component key;
        unbound visible VECTOR paint must remain inline until assets exist.
      actual: >
        prune_duplicated_cluster_subtrees unconditionally cleared children;
        hydrate_pruned_cluster_instances keyed pruned duplicates as leaf while
        templates used structure signatures, so paint was lost before emit.
    authority_boundary: clean_tree
    evidence:
      - kind: debug_artifact
        path: .debug/screen/test/niyama_order/processed.json
        summary: >
          Plus icon STACK cluster_id component_910_3249 with empty children and
