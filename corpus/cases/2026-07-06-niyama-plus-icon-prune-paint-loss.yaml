      - kind: debug_artifact
        path: .debug/screen/test/niyama_order/run.meta.json
        summary: Plan failed on plus_icon_widget.dart shrink-only body.
    repair:
      summary: >
        Block cluster prune when subtree still carries unbound visible VECTOR paint;
        register and resolve hydration templates under cluster_id + component_ref
        fallback keys so pruned duplicates regain inline children when assets transfer.
      changed_files:
        - src/figma_flutter_agent/parser/dedup/prune.py
        - src/figma_flutter_agent/parser/dedup/hydrate.py
      regression_tests:
