version: 1

case:
  id: 2026-07-07-niyama-card-horizontal-row-axis
  title: Horizontal product row must not verticalize through generic Card emit
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T01:10:00Z'
  updated_at: '2026-07-07T01:10:00Z'
  summary: >
    Product rows named Card (347x76, image 76x76 + body column) were typed CARD from the
    layer name and emitted through Card→Column(stretch), stacking image above body and
    blowing vertical layout. Horizontal thumbnail rows must reject name-only CARD typing
    and emit Row when anatomy is image+body side by side.

