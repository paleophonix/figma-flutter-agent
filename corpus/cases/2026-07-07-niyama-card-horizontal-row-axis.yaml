      symbol: validate_semantic_type_for_node
    contract:
      field: horizontal product row primary axis
      field_class: fact
      category: illegal
      expected: >
        A horizontal image+body row keeps ROW/COLUMN anatomy and CARD emit uses Row, not
        a vertical Card→Column fallback.
      actual: >
        Name Card forced CARD typing and generic Card→Column verticalized the row.
    authority_boundary: clean_tree_semantic_type
    evidence:
