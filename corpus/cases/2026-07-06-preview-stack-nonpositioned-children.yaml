version: 1

case:
  id: 2026-07-06-preview-stack-nonpositioned-children
  title: Verbatica preview shows only footer — Stack root children not positioned
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-06
  created_at: '2026-07-06T17:40:00Z'
  updated_at: '2026-07-06T18:10:00Z'
  summary: >
    After the stack_root_flattened_to_column fix, the default (non-artboard)
    LayoutBuilder branch of verbatica_paywall_layout.dart emits the root as a Stack
    but only wraps some children in Positioned (the feature and feature3
    SingleChildScrollViews). _buildFeature2 (header) and _buildFeature4 (footer) are
    non-positioned Stack children, so they resolve to top-left and the footer, painted
    last, overpaints the content. In Chrome the app shows only the bottom footer
    (subscribe button plus links) while the artboard-capture branch renders the full
    paywall correctly. The root is under Align(alignment: Alignment.bottomCenter),
    which compounds the misplacement.
    User observation: "verbatica виден только низ".

