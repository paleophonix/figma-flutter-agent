version: 1

case:
  id: 2026-07-04-sectionize-nav-scroll-host-emit-drop
  title: Cluster delegate nested lookup collapses column root to single 
    extracted widget
  case_kind: regression
  project: limbo
  feature: food_add_new_items
  observed_at: 2026-07-04
  summary: >
    Parse, IR validate, layout passes, and pre_emit all conserve the full form
    (root 602:1027 with 7 sections: header, item name, upload, price, ingredients,
    details, save). After sectionize the clean tree is a COLUMN with the same 7
    children. At A3 emit, cluster_classes maps cluster_0 to AddMediaButtonWidget
    (upload tiles). resolve_cluster_delegate_class walks descendant cluster_ids
    (depth 3) in _cluster_delegate_lookup_keys, so the root COLUMN 602:1027 also
    resolves to AddMediaButtonWidget. prefer_cluster_widget then replaces the
    entire screen host with const AddMediaButtonWidget(), dropping the other six
    sections. Without cluster_classes the layout emits Column + FigmaChunk stubs
    and all section text (Save Changes, Add New Items, etc.). Chunk files are
    generated but unused when the root collapses.
    User observation: after refactoring the screen that was ready now shows only
    UPLOAD PHOTO/VIDEO and one grey box in Chrome; the full Add New Items form is
    gone.

  created_at: '2026-07-04T12:00:00Z'
  updated_at: '2026-07-04T12:00:00Z'
