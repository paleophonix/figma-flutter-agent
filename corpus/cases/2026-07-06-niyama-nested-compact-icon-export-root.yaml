  summary: >
    Order-product quantity stepper uses painted 36x36 Add product component instances
    wrapping 28x28 Icons/28/Plus and Icons/28/Minus component instances. Compact
    drawable export captured the outer control shell, skipped inner icon hosts and
    leaf vectors, and Figma Images API skip on nested INSTANCE children left no
    drawable assets bound. Plan aborted with MissingVectorAssetError on plus/minus
    vectors inside OrderProductItemWidget.

