version: 1

case:
  id: 2026-07-07-verbatica-price-font-collapsed-to-sfpro
  title: Verbatica prices render in SF Pro Text because Nekst is collapsed away
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-07
  created_at: '2026-07-07T23:30:00Z'
  updated_at: '2026-07-08T12:00:00Z'
  summary: >
    The plan prices (39,99$, 14,99$, 7,99$) use the Nekst font in Figma. Nekst is present
    on disk (assets/fonts/nekst_400/500/600.ttf) and declared in pubspec.yaml (family:
    Nekst), but the emitted price Text binds textTheme.headlineLarge, and app_typography
    hardcodes fontFamily: 'SF Pro Text' for every theme role. Typography collapse merged
    the Nekst price style into the dominant SF Pro Text role, so the prices render in a
    fallback font (looking bold/wrong) while the packaged Nekst family is orphaned.
    Collapse must preserve each node's Figma font family.
    User observation: цены не тем шрифтом, должен быть Nekst, он есть на диске.

