case:
  id: 2026-07-06-button-surface-paint-not-transferred-ink-occluded
  title: Button surface paint kept on opaque inner child, occluding InkWell and radius
  case_kind: regression
  project: test
  feature: rep_edit_profile
  observed_at: 2026-07-06
  created_at: '2026-07-06T14:05:00Z'
  updated_at: '2026-07-06T14:05:00Z'
  summary: >
    The primary action button (node 2112:20299) emits a double surface: the outer
    host Container/Material has borderRadius 25 and no fill and wraps the InkWell,
    while a nested SaveButtonContentWidget paints an opaque white fill with
    borderRadius 12 at width 350 inside the 345 host. The button fill is never
    transferred to the host Ink decoration, so the opaque inner child occludes the
    ink splash (no visible tap animation) and the two mismatched radii (25 vs 12)
    plus the 350>345 overflow produce the wrong pill shape.
    User observation: "кнопка не той формы и без анимации".

