  title: Extracted AvatarWidget collapses to edit-badge subtree only
  case_kind: regression
  project: limbo
  feature: mobile_settings
  observed_at: 2026-07-05
  created_at: '2026-07-05T20:45:00Z'
  updated_at: '2026-07-06T00:31:00Z'
  summary: >
    LAW-WIDGETIR-CONSERVE — pre_emit extractedWidgets AvatarWidget roots at
    figmaId 272:9638 (80x80 profile stack plus edit badge) but avatar_widget.dart
    materializes only the 24x24 blue edit host 272:9624/272:9625. Expected:
    full ProfileAvatarWidget body (component_6_1263, 81.5x82) in the profile slot.
    Actual: lone blue circle in an 81.5x82 slot; profile silhouette and rounded
    avatar plate missing. First arrow where fact changed: A3 extracted widget emit.
    User observation: stick plus circle instead of avatar — circle is the edit badge,
    not the profile photo.

