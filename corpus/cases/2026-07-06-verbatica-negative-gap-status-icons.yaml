version: 1

case:
  id: 2026-07-06-verbatica-negative-gap-status-icons
  title: Status bar Wi-Fi cluster negative gap emitted as illegal Flex spacing
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-06
  created_at: '2026-07-06T18:35:00Z'
  updated_at: '2026-07-07T00:15:00Z'
  summary: >
    Figma Wi-Fi Network row is 30px wide with two 16px icons and itemSpacing -2.
    A prior fix conserved overlap by emitting Row(spacing: -2.0), which crashes Flutter
    (Flex.spacing >= 0.0). Negative overlap must use Transform.translate cumulative
    offsets, never negative Flex.spacing.

occurrences:
  - id: verbatica-paywall-status-icon-negative-gap
    family_id: negative_flex_gap_dropped
    pipeline_arrow: A3
    law_id: LAW-NEGATIVE-GAP-CONSERVATION
    stage: emitter
    origin: COMPILER
    blast_radius: B3_BLOCKING
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/generator/layout/widgets/flex_sizing.py
      symbol: flex_children_body
    contract:
      field: flex itemSpacing (negative overlap)
      field_class: fact
      category: illegal
      expected: >
        Negative Figma itemSpacing is conserved via Transform.translate on later
        children. Flex.spacing is never emitted when spacing <= 0.
      actual: >
        _flex_spacing_field emitted Row(spacing: -2.0), crashing Flutter at build time.
    authority_boundary: planned_dart_graph
    evidence:
      - kind: source_code
        path: apps/test/lib/widgets/status_bar_content_widget.dart
        summary: line 18 Row(spacing -2.0) with two 16px icon children.
      - kind: log
        path: apps/test (Chrome preview)
        summary: flex.dart:441 assertion spacing >= 0.0 is not true building StatusBarContentWidget.
      - kind: debug_artifact
        path: .debug/screen/test/verbatica_paywall/processed.json
        summary: Wi-Fi Network row width 30, itemSpacing -2, two 16px vector children.
    repair:
      summary: >
        _flex_spacing_field clamps to spacing > 0 only. flex_children_body composes
        negative gaps with cumulative Transform.translate instead of Flex.spacing.
      changed_files:
        - src/figma_flutter_agent/generator/layout/widgets/flex_sizing.py
      regression_tests:
        - tests/test_layout_flex_policy.py::test_negative_row_spacing_emits_overlap_via_transform_not_flex_spacing
      verification:
        - poetry run pytest tests/test_layout_flex_policy.py::test_negative_row_spacing_emits_overlap_via_transform_not_flex_spacing -q
