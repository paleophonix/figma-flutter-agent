version: 1

case:
  id: 2026-07-06-verbatica-negative-gap-status-icons
  title: Status bar Wi-Fi cluster negative gap emitted as illegal Flex spacing
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-06
  created_at: '2026-07-06T18:35:00Z'
  updated_at: '2026-07-06T20:20:00Z'
  summary: >
    Figma Wi-Fi Network row is 30px wide with two 16px icons and itemSpacing -2.
    The first fix dropped non-positive spacing (2px right overflow); the follow-up fix
    conserved it by emitting Row(spacing: -2.0) in StatusBarContentWidget. Flutter
    asserts Flex.spacing >= 0.0 (flex.dart:441), so the app now crashes at build with
    "spacing >= 0.0 is not true" instead of overflowing. Negative overlap cannot be
    expressed via Flex.spacing; the conservation fix is invalid and must express
    overlap through Stack/Positioned/Transform or a negative-margin wrapper, never a
    negative Flex.spacing. Reopened: the prior FIXED regressed an overflow into a crash.
    User observation: verbatica part of screen renders then crashes on the status bar.

