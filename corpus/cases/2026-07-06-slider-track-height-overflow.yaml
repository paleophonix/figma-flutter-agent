version: 1

case:
  id: 2026-07-06-slider-track-height-overflow
  title: Commission range slider crammed into 8px track height overflows 63px
  case_kind: regression
  project: test
  feature: rep_edit_profile
  observed_at: 2026-07-06
  created_at: '2026-07-06T17:20:00Z'
  updated_at: '2026-07-06T17:20:00Z'
  summary: >
    The commission range slider (node 2237:17331) is extracted as
    CommissionRangeSliderWidget bound to its Figma track height of 8px. The emitted
    body is Container(height: 8, child: Center(Column([Text('Slider / Range'),
    Slider(value: 0.5)]))) — an interactive native Slider plus the node NAME as a
    Text, inside a Column with mainAxisSize.max under an 8px height constraint. The
    Column needs the slider control min height (slider_facts _RANGE_SLIDER_MIN_HEIGHT_PX
    = 48) so Flutter throws "A RenderFlex overflowed by 63 pixels on the bottom".
    The control is also single-thumb (not a range), wrong color/size, and leaks the
    node name as visible text. This survived two commits because the mechanism had
    no corpus family, so the repair loop never targeted it.
    User observation: "один ползунок и не того цвета и размера" and persistent 63px overflow.

