version: 1

case:
  id: 2026-07-05-compact-icon-host-foreground-omit
  title: List-row compact icon hosts emit empty white circle plates
  case_kind: regression
  project: limbo
  feature: food_menu_2
  observed_at: 2026-07-05
  summary: >
    CompactIconHostForegroundLaw — multi-row cluster widgets emit full-size
    ellipse plate SVGs (48x48 white circles) without the inset foreground
    pictogram. Expected: plate plus wallet/command/receipt glyph centered in the
    48x48 host (as Personal Info rows do). Actual: only ellipse_1 SVG at host
    extent, foreground vector omitted in absolute-slot button rows inside
    Group8264Widget and mis-layered Button/Back host on Log Out. First arrow: A3
    compact icon host / absolute slot emit. User observation: empty white circles
    on Withdrawal History and User Reviews; white circle under Log Out.

  created_at: '2026-07-05T19:25:00Z'
  updated_at: '2026-07-05T22:50:00Z'

