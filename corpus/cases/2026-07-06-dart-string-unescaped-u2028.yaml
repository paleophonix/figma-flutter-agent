version: 1

case:
  id: 2026-07-06-dart-string-unescaped-u2028
  title: Figma text with U+2028 breaks emitted Dart string literal on niyama_order
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-06
  created_at: '2026-07-06T18:15:00Z'
  updated_at: '2026-07-06T19:06:00Z'
  summary: >
    A niyama_order multiline text value contains a U+2028 LINE SEPARATOR.
    escape_dart_string escapes backslash, dollar, newline and single quote but not
    U+2028 or U+2029, so the raw separator is emitted into a single-quoted Dart string
    in lib/generated/niyama_order_chunk_00f13e69.dart. Dart treats U+2028 as a line
    terminator, so the string literal is unterminated and the following Cyrillic text
    spills as illegal characters (unterminated_string_literal at 27:6026,
    illegal_character 1058 = Cyrillic T at 28:3). The AST balance-delimiters gate could
    not reparse it and kept the pre-AST source, and the LLM repair loop could not help
    (the 21KB minified chunk exceeds the repair model context window and the repair was
    scoped to screen.dart, not the broken chunk), so generation aborts before writeback.
    User observation: niyama_order launch aborts with an unterminated string literal.

