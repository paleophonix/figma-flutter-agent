version: 1

case:
  id: 2026-07-05-cluster-widget-zero-height-stack-unbound
  title: Zero-height divider cluster stack unbounded in Column
  case_kind: regression
  project: limbo
  feature: mobile_settings
  observed_at: 2026-07-05
  summary: >
    User observation: mobile_settings preview is a white screen with a rendering
    exception. Mechanism: ExtractedWidgetFixedBoundsLaw — SettingsDividerWidget
    (cluster component_126_1618, node 272:9316) emits a bare root Stack while
    Figma reports stack height 0.0 and the stroked vector child paints 0.5px.
    Expected: cluster widget root receives finite SizedBox height before standalone
    reuse in Column. Actual: Stack gets BoxConstraints(w=343, 0<=h<=Infinity) and
    performLayout asserts size.isFinite. First arrow where emit diverges: A3 emitter
    bound wrapper in _bound_cluster_widget_root / _bound_stack_sized_box.

  created_at: '2026-07-05T18:30:00Z'
  updated_at: '2026-07-05T19:10:00Z'

occurrences:
- id: mobile-settings-divider-stack-unbound
  family_id: cluster_widget_zero_height_stack_unbound
  pipeline_arrow: A3
  law_id: ExtractedWidgetFixedBoundsLaw
  stage: emitter
  origin: COMPILER
  blast_radius: B3_BLOCKING
  confidence: high
  status: FIXED
  owner:
    module: src/figma_flutter_agent/generator/widget_extractor.py
    symbol: _bound_cluster_widget_root
  contract:
    field: cluster_widget_root_bounds
    field_class: compiler_owned
    category: illegal
    expected: >
      Extracted cluster STACK roots with zero frame height derive finite height
      from positioned stroked children before emit.
    actual: >
      _bound_stack_sized_box returned None for height 0 stacks; SettingsDividerWidget
      emitted unbounded root Stack and crashed under Column.
  authority_boundary: cluster_extraction
  evidence:
  - kind: debug_artifact
    path: .debug/screen/limbo/mobile_settings/screen.dart
    summary: >
      SettingsDividerWidget build returns bare Stack(clipBehavior: Clip.none) with
      Positioned height 0.5 and no enclosing finite height wrapper.
  - kind: debug_artifact
    path: .debug/screen/limbo/mobile_settings/processed.json
    summary: >
      Divider stack 272:9316 sizing height 0.0; child I272:9316;126:1617 has
      borderWidth 0.5 and zero bbox height.
  - kind: log
    path: .debug/screen/limbo/mobile_settings/last.log
    summary: >
      Flutter render assert size.isFinite on Stack in settings_divider_widget.dart.
  repair:
    summary: >
      Two-layer emit fix for zero-height hairline cluster stacks. First,
      finalize_extracted_widget_body unwraps a Stack whose sole child is
      Positioned, then strips the Positioned to a bounded child. Second,
      stack_layout_bounded_height plus _bound_cluster_widget_root wrap any
      remaining positioned-only stacks in a finite SizedBox. Finalize now runs
      before bound on all cluster/subtree paths so unwrap is not blocked by an
      outer SizedBox.
    changed_files:
    - src/figma_flutter_agent/generator/layout/widget_roots.py
    - src/figma_flutter_agent/generator/layout/flex_policy/stack.py
    - src/figma_flutter_agent/generator/widget_extractor.py
    - src/figma_flutter_agent/generator/ir/extracted.py
    - src/figma_flutter_agent/generator/subtree/render.py
    regression_tests:
    - tests/test_mobile_settings_emit_laws.py
    - tests/test_mobile_settings_cluster_delegate_reconcile.py::test_settings_divider_cluster_root_gets_finite_bounds
    verification:
    - poetry run pytest tests/test_mobile_settings_emit_laws.py tests/test_mobile_settings_cluster_delegate_reconcile.py -q
