version: 1

case:
  id: 2026-07-07-niyama-cutlery-expanded-unbounded-width-crash
  title: CutleryOption Expanded under OverflowBox crashes layout and kills hit-testing
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T02:45:00Z'
  updated_at: '2026-07-07T03:30:00Z'
  summary: >
    In CutleryOptionWidget the "Гости" label row is emitted as
    Positioned -> ClipRect -> Align -> OverflowBox -> Row -> SizedBox -> Row with an
    Expanded(Text('Гости')) child. OverflowBox and Align pass unbounded width during
    measurement, so the inner Row receives 0<=w<=Infinity and the Expanded triggers
    "RenderFlex children have non-zero flex but incoming width constraints are
    unbounded" at cutlery_option_widget.dart:16. The RenderFlex size is MISSING, which
    cascades into many "Cannot hit test a render box with no size" errors, so the add
    and stepper buttons are unclickable and the add-to-order carousel collapses to a
    single image. Flex children must not sit under an unbounded-width host.
    User observation: order buttons not clickable, carousel shows one image, куча оверфлоу.

