      Remove the local cluster_classes shadow so planner-provided delegate maps
      flow into vector-variant restore and collapse guards again.
    changed_files:
    - src/figma_flutter_agent/generator/planned/reconcile/__init__.py
    regression_tests:
    - tests/test_mobile_settings_cluster_delegate_reconcile.py
    verification:
    - poetry run pytest tests/test_mobile_settings_cluster_delegate_reconcile.py -q
