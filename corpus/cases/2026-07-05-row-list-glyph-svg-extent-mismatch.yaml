version: 1

case:
  id: 2026-07-05-row-list-glyph-svg-extent-mismatch
  title: List-row leading glyphs size to wrong paint or host extents
  case_kind: regression
  project: limbo
  feature: food_menu_2
  observed_at: 2026-07-05
  summary: >
    RowListGlyphIntrinsicBoundsLaw — leading row pictograms must size to the
    component slot (24x24) not nested micro-vector paint spans nor the 48x48 host
    stack. Expected: receipt-outline and logout icons fill their 24x24 slots.
    Actual: Number of Orders receipt SVG inflates to 48x48 host extent in
    Group8264Widget; Log Out download export shrinks to 1.6x12 paint span. First
    arrow: A3 SvgPicture dimension emit. User observation: icon oversized under
    Number of Orders; logout/row icons wrong or missing.

  created_at: '2026-07-05T19:25:00Z'
  updated_at: '2026-07-05T22:50:00Z'

occurrences:
- id: food-menu-orders-receipt-oversized
  family_id: row_list_glyph_svg_extent_mismatch
  pipeline_arrow: A3
  law_id: RowListGlyphIntrinsicBoundsLaw
  stage: emitter
  origin: COMPILER
  blast_radius: B2_SILENT_WRONG_BEHAVIOR
  confidence: high
  status: FIXED
  owner:
    module: src/figma_flutter_agent/generator/layout/widgets/svg.py
    symbol: _intrinsic_glyph_svg_dimensions
  contract:
    field: sizing
    field_class: compiler_owned
    category: illegal
    expected: receipt-outline_602_847 SvgPicture uses 24x24 glyph slot inside 48x48 host.
    actual: Group8264Widget emits receipt SVG at width 48.0 height 48.0.
  authority_boundary: emit_layout
  evidence:
  - kind: debug_artifact
    path: .debug/screen/limbo/food_menu_2/screen.dart
    summary: >
      Group8264Widget Number of Orders host 602:839 uses receipt-outline at 48x48.
  - kind: debug_artifact
    path: .debug/screen/limbo/food_menu_2/processed.json
    summary: >
      Icon stack 602:846 is 24x24; parent host 602:839 is 48x48.
  repair:
    summary: >
      Stop classifying non-chevron exports as trailing chevron slots and prefer
      layout slot extents when intrinsic paint is much smaller than the host frame.
    changed_files:
    - src/figma_flutter_agent/parser/interaction/icons.py
    - src/figma_flutter_agent/generator/layout/widgets/svg.py
    regression_tests:
    - tests/test_food_menu_2_emit_laws.py::test_number_of_orders_receipt_glyph_uses_24_extent
    verification:
    - poetry run pytest tests/test_food_menu_2_emit_laws.py -q

