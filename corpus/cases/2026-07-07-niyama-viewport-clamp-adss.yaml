version: 1

case:
  id: 2026-07-07-niyama-viewport-clamp-adss
  title: Viewport clamp must not rewrite scroll-tail Adss placement on tall artboard
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T01:10:00Z'
  updated_at: '2026-07-07T01:10:00Z'
  summary: >
    On the 375x1483 niyama artboard, the Adss background section at stackPlacement top
    1020 was rewritten to top 616 by viewport_clamp_guard, leaking the section label into
    the modal region. Tall mobile artboards are scroll hosts; viewport clamp must skip
    direct root children when the artboard aspect ratio exceeds the tall-mobile threshold.

