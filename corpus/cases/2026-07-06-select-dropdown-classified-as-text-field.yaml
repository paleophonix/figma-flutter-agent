version: 1

case:
  id: 2026-07-06-select-dropdown-classified-as-text-field
  title: Select/dropdown fields classified as editable text input
  case_kind: regression
  project: test
  feature: rep_edit_profile
  observed_at: 2026-07-06
  created_at: '2026-07-06T14:05:00Z'
  updated_at: '2026-07-06T14:05:00Z'
  summary: >
    Non-editable single-select rows ("Choose your countries / cities / languages /
    type of property") carry a fixed value plus a trailing chevron glyph but the
    classifier only produced one input_dropdown candidate; the remaining select
    rows won input_text_field (conf 0.88) and materialized as editable
    TextFormField with a decorative keyboard_arrow_down suffix IconButton. The
    dropdown/select semantic candidate is never generated for the repeated select
    component, so a picker control compiles as a free-text field.
    User observation: "выпадающий список превратился в текстобокс".

