case:
  id: 2026-07-07-niyama-cutlery-component-vector-family-discovery
  title: Component variant vector binds sibling export via file-key family discovery
  case_kind: regression
  project: test
  feature: niyama_order_2
  observed_at: 2026-07-07
  created_at: '2026-07-07T21:30:00Z'
  updated_at: '2026-07-07T22:00:00Z'
  summary: >
    CutleryInfoWidget cluster materialization aborts when a visible compact icon
    VECTOR uses a variant leaf id (1162:10248) that was not re-exported, while an
    on-disk SVG from the same Figma component file key (vector_1162_10106.svg) already
    exists from a sibling variant on another screen. Node-id-only discovery misses the
    family export and raises MissingVectorAssetError before writeback.

