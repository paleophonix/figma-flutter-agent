      category: illegal
      expected: >
        Large custom overlay sheets are not typed DIALOG from name hints alone and never
        emit AlertDialog with the frame name as title.
      actual: >
        Modal 375x1213 became DIALOG and AlertDialog(title Text('Modal')).
