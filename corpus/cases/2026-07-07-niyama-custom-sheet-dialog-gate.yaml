version: 1

case:
  id: 2026-07-07-niyama-custom-sheet-dialog-gate
  title: Custom overlay sheet must not become native AlertDialog from name Modal
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T01:00:00Z'
  updated_at: '2026-07-07T01:00:00Z'
  summary: >
    The niyama order modal frame (375x1213, custom dark fill, header and scroll body) was
    typed DIALOG from the layer name Modal and emitted as AlertDialog(title: Text('Modal'))
    with OK action. That leaked the frame name, applied light Material chrome, and narrowed
    content. Custom overlay sheets must render structurally; compact confirmation dialogs
    may still use native AlertDialog.

