    contract:
      field: node_multiset
      field_class: fact
      category: illegal
      expected: >
        Cluster reprune flatten transfer includes nested pruned stub flatten_figma_node_ids
        so CP0b_reprune stays multiset-idempotent across repeated planning passes.
      actual: >
        collect_descendant_figma_ids ignored nested flatten metadata; parent reprune
        cleared children without re-homing descendant ids and CP0b blocked codegen.
