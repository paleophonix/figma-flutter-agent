version: 1

case:
  id: 2026-07-07-niyama-cluster-prune-nested-flatten-reprune
  title: CP0b reprune drops nested flatten metadata from pruned cluster stubs
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T13:45:00Z'
  updated_at: '2026-07-07T13:50:00Z'
  summary: >
    Second CP0b cluster reprune on niyama_order collapsed a duplicate parent cluster
    while a live child was already a pruned stub with flatten_figma_node_ids. Dedup used
    collect_descendant_figma_ids (live children only), so nested flatten ids vanished
    from the conservation multiset and plan aborted with inv_node_multiset@I4408.

