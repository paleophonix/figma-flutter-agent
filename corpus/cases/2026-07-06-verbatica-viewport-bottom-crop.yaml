version: 1

case:
  id: 2026-07-06-verbatica-viewport-bottom-crop
  title: Verbatica live viewport crops paywall to footer band
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-06
  created_at: '2026-07-06T18:35:00Z'
  updated_at: '2026-07-06T18:35:00Z'
  summary: >
    With responsive_enabled=false the default LayoutBuilder fallback used
    bottom_chrome_pinned_live_viewport Align(bottomCenter), clipping the 780px
    artboard to the viewport bottom so Chrome showed only the footer CTA while the
    artboard-capture branch rendered the full paywall. User observation: verbatica
    виден только низ.

