version: 1

case:
  id: 2026-07-08-verbatica-hero-pinned-nested-scroll
  title: Verbatica hero stays pinned because the root uses nested scrollers
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-08
  created_at: '2026-07-08T12:30:00Z'
  updated_at: '2026-07-08T15:00:00Z'
  summary: >
    The default browser branch of verbatica_paywall_layout.dart emits an outer
    SingleChildScrollView wrapping SizedBox(height: 780) -> Stack, where the hero band is
    Positioned.fill(_buildBackground) (non-scroll) and the plan content lives in nested
    Positioned SingleChildScrollViews. The hero image therefore stays pinned while the
    content scrolls in its own inner scroller, so the picture does not scroll with the
    rest of the content. The screen should be one unified scroll (hero band as a
    normal-flow child that scrolls away), not a pinned backdrop plus nested scrollers.
    User observation: картинка не скроллится с остальным контентом, а остаётся прилипшей.

