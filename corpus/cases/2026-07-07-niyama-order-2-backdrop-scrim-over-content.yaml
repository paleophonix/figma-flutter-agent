case:
  id: 2026-07-07-niyama-order-2-backdrop-scrim-over-content
  title: Order-completed modal fully dimmed — backdrop scrim painted over content
  case_kind: regression
  project: test
  feature: niyama_order_2
  observed_at: 2026-07-07
  created_at: '2026-07-07T03:45:00Z'
  updated_at: '2026-07-07T03:45:00Z'
  summary: >
    In niyama_order_2_layout.dart the root Stack is Stack([_buildModal, _buildBgBlur]).
    _buildBgBlur is a translucent scrim Container(375x812, color 0x99000000) for node
    "bg blur" (3561:42975), whose Figma id is below "Modal" (3561:42976) and is painted
    first (behind) in Figma. Emitting it as the last Stack child makes Flutter paint the
    60% black scrim over the entire modal, so the whole order-completed sheet looks
    dimmed, product images are invisible and detail rows wash out. Root stack
    decomposition must preserve Figma paint order so backdrops stay behind content.
    User observation: order2 everything shaded, images not visible, details missing.

