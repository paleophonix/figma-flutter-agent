version: 1

case:
  id: 2026-07-03-fidelity-authority-synthetic
  title: LLM native_verified bypasses manifest authority
  case_kind: regression
  project: synthetic
  feature: fidelity_authority
  observed_at: 2026-07-03
  summary: >
    A semantic IR node with LLM-authored native_verified tier was accepted
    by the fidelity stamp and could route to native template emit without
    manifest authority.

occurrences:
  - id: fidelity-authority-bypass
    family_id: llm_fidelity_authority_bypass
    pipeline_arrow: A1
    law_id: LAW-A1-FIDELITY-AUTHORITY
    stage: ir_validation
    origin: COMPILER
    blast_radius: B2_SILENT_WRONG_BEHAVIOR
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/generator/ir/fidelity/stamp.py
      symbol: _stamp_node
    contract:
      field: fidelityTier
      field_class: compiler_owned
      category: illegal
      expected: Manifest or compiler policy assigns fidelity authority.
      actual: LLM-authored native_verified was accepted as authoritative.
    authority_boundary: fidelity_manifest
    evidence:
      - kind: source_code
        path: src/figma_flutter_agent/schemas/ir.py
        summary: LLM schema exposes fidelityTier and tierSource.
      - kind: source_code
        path: src/figma_flutter_agent/generator/ir/fidelity/stamp.py
        summary: Pre-set tier bypassed manifest resolution.
      - kind: test
        path: tests/test_fidelity_authority.py
        summary: Regression reproduces self-promotion and verifies the fix.
    repair:
      changed_files:
        - src/figma_flutter_agent/generator/ir/presence/sanitize.py
        - src/figma_flutter_agent/generator/ir/fidelity/stamp.py
      regression_tests:
        - tests/test_fidelity_authority.py::test_llm_native_verified_on_unknown_kind_not_authoritative
        - tests/test_fidelity_authority.py::test_llm_manual_override_not_trusted
        - tests/test_fidelity_authority.py::test_repair_replace_subtree_strips_fidelity_authority
      verification:
        - poetry run pytest -q tests/test_fidelity_authority.py tests/test_fidelity_stamp.py
