case:
  id: 2026-07-04-control-misclassified-as-text-input
  title: Painted CTA column must not compile as inline TextFormField
  case_kind: regression
  project: limbo
  feature: mobile_sub_plans
  observed_at: 2026-07-04
  summary: >
    Non-input controls (bordered label pills / primary CTA rows inside a single-child
    COLUMN) were classified by the inline input host detector and emitted as
    TextFormField with initialValue, losing button affordance. Reproduced on
    food_add_new_items upload tiles, food_menu_2 Withdraw, and mobile_sub_plans
    Subscribe. Structural field-affordance gates must veto centered flex action
    surfaces and Figma button component instances before COLUMN inline-input emit.

  created_at: '2026-07-04T12:00:00Z'
  updated_at: '2026-07-04T16:55:00Z'
