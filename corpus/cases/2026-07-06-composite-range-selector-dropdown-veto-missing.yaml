version: 1

case:
  id: 2026-07-06-composite-range-selector-dropdown-veto-missing
  title: Composite range selector misclassified as dropdown with leaked frame names
  case_kind: regression
  project: test
  feature: rep_edit_profile
  observed_at: 2026-07-06
  created_at: '2026-07-06T14:05:00Z'
  updated_at: '2026-07-06T14:05:00Z'
  summary: >
    The commission range selector (node 2237:17339) is a composite control:
    label plus two paired numeric inputs, a unit suffix and a range slider. The
    arbiter accepted input_dropdown (conf 0.9) without a veto, and the emitter
    rendered a native DropdownButton whose menu items are the raw child frame
    names ("Frame 3764", "Frame 3763"). A structural composite is collapsed into
    a single-select control and the item labels leak Figma frame identifiers.
    User observation: "выпадающий список" appears on a control that is not a picker.

