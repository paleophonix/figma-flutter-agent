  summary: >
    Product row images bind to the wrong nodes. The prior fix did not hold: on the fresh
    modal_widget.dart emit the drawable-to-node order is
    [ramen-chicken, 18chip, tomyam, 18chip, vasabi, sussi, promo, guests, 18chip], so the
    "+18" bonus-chip raster (18chip.png) is bound to THREE slots including the stepper
    plus button ("+18" appears instead of the plus icon), sussi.png (sushi) lands on a
    sauce row, and Окинава Монтерей's own image slot is empty. Reopened: the semantic/
    orphan raster pairing still assigns non-product rasters (18chip) and shuffles product
    photos across sibling rows instead of keying each drawable to its own node id.
    User observation: на месте окинава пусто, окинава вместо второго соуса, чип +18 вместо плюса.

