version: 1

case:
  id: 2026-07-07-niyama-image-node-misbind
  title: Product images shuffled — sushi photo on soy-sauce row, girl on sushi
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T05:00:00Z'
  updated_at: '2026-07-07T10:50:00Z'
  summary: >
    In niyama_order the product row images are bound to the wrong nodes. sussi.png (a
    sushi photo) is emitted on the "Соевый Соус" (soy sauce) row, while the actual sushi
    product "Окинава Монтерей" falls back to portrait.png (a paywall hero photo from
    another screen). Semantic/orphan raster pairing walked entire modal subtrees for
    labels and paired orphan files by inventory count with zero overlap, shuffling human-
    named rasters across sibling product rows.

