version: 1

case:
  id: 2026-07-07-niyama-cluster-prune-late-image-cp0b-multiset
  title: Late raster bind unlocks cluster prune and breaks CP0b multiset
  case_kind: regression
  project: test
  feature: niyama_order
  observed_at: 2026-07-07
  created_at: '2026-07-07T12:40:00Z'
  updated_at: '2026-07-07T12:40:00Z'
  summary: >
    After CP0_parse hydrate leaves inline children on duplicate component instances,
    asset finalize binds imageAssetKey on the cluster root. CP0b_reprune paint guard
    treated any parent raster as drawable transfer and cleared children, dropping
    descendant node ids (inv_node_multiset@I4408*) and aborting plan.

occurrences:
  - id: niyama-order-late-image-cp0b-multiset
    family_id: cluster_prune_visible_paint_without_transfer
    pipeline_arrow: A4
    law_id: LAW-CLUSTER-PRUNE-PAINT-CONSERVATION
    stage: parser_dedup
    origin: COMPILER
    blast_radius: B3_BLOCKING
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/parser/dedup/prune.py
      symbol: _would_drop_unbound_visible_vectors
    contract:
      field: node_multiset
      field_class: fact
      category: illegal
      expected: >
        Parent imageAssetKey or vectorAssetKey alone does not authorize clearing
        hydrated inline children while visible VECTOR paint remains in descendants;
        CP0b_reprune stays multiset-idempotent.
      actual: >
        Paint guard returned early when parent had imageAssetKey; cluster prune
        cleared hydrated Cutlery/stepper subtrees and CP0b raised inv_node_multiset.
    authority_boundary: clean_tree
    evidence:
      - kind: debug_artifact
        path: .debug/screen/test/niyama_order/run.meta.json
        summary: >
          plan failed 2026-07-07T12:07:51Z with last_error CP0b_reprune
          inv_node_multiset@I4408.
      - kind: source_code
        path: src/figma_flutter_agent/stages/assets.py
        summary: >
          finalize_screen_assets calls resolve_pruned_cluster_instance_assets after
          parse CP0 hydrate.
    repair:
      summary: >
        Require vector drawable transfer before clearing subtrees with child VECTOR
        paint; parent raster or text alone no longer bypasses the guard.
      changed_files:
        - src/figma_flutter_agent/parser/dedup/prune.py
      regression_tests:
        - tests/test_cluster_prune_paint_conservation.py::test_late_image_asset_does_not_unlock_prune_when_child_vectors_remain
      verification:
        - poetry run pytest tests/test_cluster_prune_paint_conservation.py -q
