version: 1

case:
  id: 2026-07-06-verbatica-compact-component-export-gap
  title: Status bar component icons export nested vector instead of instance host
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-06
  created_at: '2026-07-06T16:10:00Z'
  updated_at: '2026-07-06T16:10:00Z'
  summary: >
    iOS status bar Signal/Wifi/Battery are compact published component instances
    (componentId 282:23327/23343/23346) with a single visible vector child each.
    Asset collection exported the nested instance-path VECTOR ids instead of the
    component host, so drawable assets never bound to cluster representatives and
    plan failed with MissingVectorAssetError on CellularSignalIconWidget.

occurrences:
  - id: verbatica-paywall-compact-component-export-gap
    family_id: compact_component_leaf_vector_export_gap
    pipeline_arrow: A2
    law_id: CompactComponentDrawableCoverageLaw
    stage: assets
    origin: COMPILER
    blast_radius: B3_BLOCKING
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/assets/composite_icons.py
      symbol: is_figma_compact_component_drawable_node
    contract:
      field: export root selection
      field_class: fact
      category: lossy
      expected: >
        Compact published component instances without text export as one drawable
        host; descendant vectors are composite-skipped and covered by ancestor SVG.
      actual: >
        Only nested leaf VECTOR ids entered the export queue; hosts stayed unbound
        and cluster widgets aborted with MissingVectorAssetError.
    authority_boundary: asset_manifest
    evidence:
      - kind: debug_artifact
        path: .debug/screen/test/verbatica_paywall/processed.json
        summary: Signal/Wifi/Battery STACK hosts lack vectorAssetKey; child VECTORs visible.
      - kind: debug_artifact
        path: .debug/screen/test/verbatica_paywall/run.meta.json
        summary: MissingVectorAssetError on I2399:42783;266:1499;266:1646;339:8061 at plan.
    repair:
      summary: >
        Treat compact INSTANCE/COMPONENT hosts with componentId and visible vectors
        as composite drawable export roots; skip nested vector exports; treat ancestor
        host SVG as covering descendant vector paint in vector binding validation.
      changed_files:
        - src/figma_flutter_agent/assets/composite_icons.py
        - src/figma_flutter_agent/assets/vector_binding.py
      regression_tests:
        - tests/test_compact_component_drawable_export.py
      verification:
        - poetry run pytest -q tests/test_compact_component_drawable_export.py tests/test_composite_icons.py tests/test_cluster_icon_missing_vector_asset.py
