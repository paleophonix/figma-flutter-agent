version: 1

case:
  id: 2026-07-07-niyama-order2-icons-shrink-shells
  title: order2 top meal image and location/guest/cutlery icons emit empty shrink shells
  case_kind: regression
  project: test
  feature: niyama_order_2
  observed_at: 2026-07-07
  created_at: '2026-07-07T14:00:00Z'
  updated_at: '2026-07-07T23:10:00Z'
  summary: >
    In niyama_order_2 the top meal illustration ("Img") and several vector icons
    (location, guest/seat, cutlery) emit Semantics(label, SizedBox.shrink()) — empty
    shells — even though the drawables (meal.png and the icon SVGs) exist on disk under
    assets/images and assets/icons. The render-boundary/icon nodes lose their drawable
    asset key during parse/bind and degrade to shrink instead of resolving the on-disk
    asset or failing loudly, so the header icon slot is an empty circle and the location,
    guest and cutlery glyphs are missing (cutlery even falls back to a lock icon
    elsewhere). Binding must resolve the on-disk asset by node id or emit a named
    placeholder, never a silent shrink when the asset exists.

