  title: order2 top meal image and location/guest/cutlery icons emit empty shrink shells
  case_kind: regression
  project: test
  feature: niyama_order_2
  observed_at: 2026-07-07
  created_at: '2026-07-07T14:00:00Z'
  updated_at: '2026-07-08T19:30:00Z'
  summary: >
    In niyama_order_2 the top meal illustration and vector icons (location, guest/seat,
    cutlery) emitted SizedBox.shrink() when drawables were missing or semantic manifest
    could not pair Cyrillic product titles to on-disk rasters. Batch repair 2026-07-08
    restored role-named raster over icon-library SVG aliases, whole-word condiment guards
    (sous vs souse in dish copy), Cyrillic title→latin stem orphan pairing, and on-disk
    okinawa-monterey.png / oblepih-mango.png fixture exports for product thumbs.

