version: 1

case:
  id: 2026-07-07-verbatica-status-bar-battery-slot-overflow
  title: Status bar Column overflows 36px because Battery slot is 52px tall
  case_kind: regression
  project: test
  feature: verbatica_paywall
  observed_at: 2026-07-07
  created_at: '2026-07-07T01:20:00Z'
  updated_at: '2026-07-07T02:30:00Z'
  summary: >
    In StatusBarContentWidget the Battery icon slot is emitted as SizedBox(height: 52)
    because the Figma Battery ROW (I2399:42783;266:1499;266:1647) is parsed 16x52 while
    it only wraps a 16x16 Battery STACK. The status-bar Column (icon row 52 + spacing 4
    + time row 20 = 76) is placed in a fixed 40px bar, so Flutter throws
    "A RenderFlex overflowed by 36 pixels on the bottom" at status_bar_content_widget.dart:18.
    System-chrome icon slots must clamp to the bar height or the inner icon intrinsic
    instead of using the inflated node bound verbatim.
    User observation: verbatica status bar overflow after the negative-gap fix.

occurrences:
  - id: verbatica-paywall-battery-slot-height-overflow
    family_id: status_chrome_icon_slot_height_overflow
    pipeline_arrow: A3
    law_id: LAW-STATUS-CHROME-SLOT-HEIGHT-CLAMP
    stage: emitter
    origin: COMPILER
    blast_radius: B2_SILENT_WRONG_BEHAVIOR
    confidence: high
    status: FIXED
    owner:
      module: src/figma_flutter_agent/generator/layout/flex_policy/extents.py
      symbol: bind_row_cross_axis_height
    contract:
      field: status-bar icon slot height
      field_class: fact
      category: illegal
      expected: >
        A status-bar icon group emits at the icon intrinsic (16px) or clamps to the bar
        height (40px), so the status-bar Column fits its fixed height with no overflow.
      actual: >
        The Battery slot emits SizedBox(height: 52) from the inflated ROW bound, so the
        status-bar Column is 76px in a 40px bar and overflows 36px bottom.
    authority_boundary: planned_dart_graph
    evidence:
      - kind: source_code
        path: apps/test/lib/widgets/status_bar_content_widget.dart
        summary: line 18 SizedBox(height 52) battery row inside a Column in SizedBox(height 40).
      - kind: debug_artifact
        path: .debug/screen/test/verbatica_paywall/processed.json
        summary: Battery ROW 266:1647 is 16x52 wrapping Battery STACK 266:1648 which is 16x16.
      - kind: log
        path: apps/test (Chrome preview)
        summary: A RenderFlex overflowed by 36 pixels on the bottom at status_bar_content_widget.dart:18.
    repair:
      summary: >
        bind_row_cross_axis_height clamps inflated single-child icon-wrapper ROWs to the
        inner stack/vector intrinsic (16px) instead of the Figma wrapper height (52px),
        so status-bar Columns fit their fixed 40px host without overflow.
      changed_files:
        - src/figma_flutter_agent/generator/layout/flex_policy/extents.py
      regression_tests:
        - tests/test_intrinsic_sizing_policy.py::test_row_cross_axis_height_clamps_inflated_icon_wrapper_row
      verification:
        - poetry run pytest tests/test_intrinsic_sizing_policy.py::test_row_cross_axis_height_clamps_inflated_icon_wrapper_row -q
