discord:
  enabled: true
  guild_ids: []
  sync_joined_guilds: true
  changelog_channel_id: null
  access:
    mode: everyone
    allowed_role_ids: []
    allowed_user_ids: []

projects:
  workspace_root: .data/workspace
  default_user_key: default
  users: {}
  repos:
    default:
      provider: gitlab
      remote: ""
      target_branch: main
      lib_root: lib
      pubspec_path: pubspec.yaml
      bot_push: false

gitlab:
  base_url: https://gitlab.com
  app_project_id: "83548281"
  artifacts_project_id: ""
  target_branch: main
  # Optional: override issue branch name (else use gitlab_workflow.issue_branch_template below)
  # Placeholders: {issue_iid}, {feature_slug}, {job_id}
  # issue_branch_template: "figma/{feature_slug}"

publish:
  custom_code_policy: preserve_custom
  pr_strategy: update_open
  source_branch_template: "figma/{feature_slug}"

preview:
  companion_scheme: figma-flutter
  token_ttl_sec: 3600
  static_port_base: 17357
  adaptive_port_base: 17358
  release_build: true

internal:
  callback_secret: ""
  webhook_bind: "127.0.0.1:8787"
  control_panel_url: "https://mistie-unmobile-reflectively.ngrok-free.dev"

artifacts:
  remote: ""

feedback:
  priority_labels:
    total_mess: ["priority::high", "P1"]
    major_wrong: ["priority::medium", "P2"]
    minor_wrong: ["priority::low", "P3"]

# GitLab Issue-first workflow (primary path when discord.enabled: false).
gitlab_workflow:
  enabled: true
  agent_username: "ff-agent"  # GitLab user assigned on issues
  # Branch for generated code pushed to the app repo (GitLab → Repository → Branches)
  # Placeholders: {issue_iid}, {feature_slug}, {job_id}
  issue_branch_template: "agent/issue-{issue_iid}"
  commit_debug_artifacts: true
  # Examples:
  # issue_branch_template: "figma/{feature_slug}"
  # issue_branch_template: "figma/issue-{issue_iid}-{feature_slug}"
  escalation_assignee_username: "paleophonic"  # /bug assignee — your GitLab username

repair:
  enabled: false

telegram:
  channels: {}

database:
  mode: external
  url: ""
