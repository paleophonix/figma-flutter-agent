# VPS production stack: control panel + worker + Redis + Postgres + Caddy (TLS).
#
# Prereqs on the host: Docker Engine + Compose v2, ports 80/443 free.
#
# Quick start (from repo root after copying env.production.example → .env):
#   docker compose -f docker-compose.deploy.yml --profile bundled-db up -d --build
#
# Optional profiles:
#   --profile repair          OpenCode headless repair
#   --profile observability   Prometheus + Grafana
#
# Config files at repo root:
#   .env  .control-panel.yml  .ai-figma-flutter.yml  Caddyfile

name: figma-cp-deploy

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.control-panel

x-app-env: &app-env
  FIGMA_CP_DATABASE_MODE: ${FIGMA_CP_DATABASE_MODE:-bundled}
  FIGMA_CP_PG_PASSWORD: ${FIGMA_CP_PG_PASSWORD:?Set FIGMA_CP_PG_PASSWORD in .env}
  FIGMA_CP_DATABASE_URL: ${FIGMA_CP_DATABASE_URL:-}
  FIGMA_CP_REDIS_URL: redis://redis:6379/0
  FIGMA_CP_INTERNAL_URL: ${FIGMA_CP_INTERNAL_URL:?Set public HTTPS URL in .env}
  FIGMA_CP_NGROK_AUTOSTART: "0"
  FIGMA_GOLDEN_RUNTIME: docker
  REPAIR_OPENCODE_URL: ${REPAIR_OPENCODE_URL:-http://opencode:4096}

x-app-volumes: &app-volumes
  - ${FIGMA_CP_WORKSPACE:-./.data/workspace}:/workspace
  - ./.control-panel.yml:/app/.control-panel.yml:ro
  - ./.ai-figma-flutter.yml:/app/.ai-figma-flutter.yml:ro

services:
  postgres:
    profiles: ["bundled-db"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: figma_cp
      POSTGRES_PASSWORD: ${FIGMA_CP_PG_PASSWORD:?Set FIGMA_CP_PG_PASSWORD in .env}
      POSTGRES_DB: figma_control_plane
    volumes:
      - ${FIGMA_CP_PGDATA:-./.data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U figma_cp -d figma_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${FIGMA_CP_REDISDATA:-./.data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal

  control-panel:
    build: *app-build
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *app-env
      FIGMA_CP_RUN_MIGRATIONS: "1"
      FIGMA_CP_PG_HOST: postgres
    volumes: *app-volumes
    expose:
      - "8787"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - edge
    command:
      [
        "uvicorn",
        "control_panel.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8787",
      ]

  arq-worker:
    build: *app-build
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *app-env
      FIGMA_CP_RUN_MIGRATIONS: "0"
      FIGMA_CP_METRICS_PORT: "9090"
    volumes:
      - ${FIGMA_CP_WORKSPACE:-./.data/workspace}:/workspace
      - ./.control-panel.yml:/app/.control-panel.yml:ro
      - ./.ai-figma-flutter.yml:/app/.ai-figma-flutter.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9090"
    depends_on:
      redis:
        condition: service_healthy
      control-panel:
        condition: service_healthy
    command: ["arq", "control_panel.workers.settings.WorkerSettings"]
    networks:
      - internal

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      FIGMA_CP_PUBLIC_HOST: ${FIGMA_CP_PUBLIC_HOST:?Set domain in .env}
      FIGMA_CP_TLS_EMAIL: ${FIGMA_CP_TLS_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      control-panel:
        condition: service_healthy
    networks:
      - edge

  opencode:
    profiles: ["repair"]
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /worktrees
    environment:
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?Set OPENCODE_SERVER_PASSWORD for repair profile}
      OPENCODE_SERVER_USERNAME: opencode
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    volumes:
      - ${FIGMA_CP_REPAIR_WORKTREES:-./.data/repair-worktrees}:/worktrees
      - .:/agent:ro
    expose:
      - "4096"
    command:
      [
        "sh",
        "-c",
        "npm install -g opencode-ai@${OPENCODE_VERSION:-1.0.0} && opencode serve --hostname 0.0.0.0 --port 4096",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --user=$$OPENCODE_SERVER_USERNAME --password=$$OPENCODE_SERVER_PASSWORD http://127.0.0.1:4096/global/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./docs/projects/26-06-18-observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    expose:
      - "9090"
    depends_on:
      - control-panel
      - arq-worker
    networks:
      - internal

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - prometheus
    networks:
      - internal

networks:
  internal:
  edge:

volumes:
  caddy_data:
  caddy_config:
